{% extends "page.html" %}

{% block main %}
<div id="access-request-submitted-main" class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="panel panel-default">
        <div class="panel-body">
          <div class="text-center">
            <h1>Request Submitted</h1>
            <div style="margin: 20px 0;">
              <i class="fa fa-check-circle" style="font-size: 4em; color: #5cb85c;"></i>
            </div>
            <p class="lead">
              Thank you for your access request. Your submission has been received and will be reviewed by the BERDL team.
            </p>

            <div style="margin-top: 30px;">
              <a href="https://{{ kbase_origin }}" class="btn btn-primary btn-lg">
                Return to KBase
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock main %}
